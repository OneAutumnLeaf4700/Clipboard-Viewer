name: Build Clipboard Viewer

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-build.txt

    - name: Build executable
      run: |
        python build.py

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardViewer-Windows
        path: |
          dist/ClipboardViewer.exe
          install.bat
          uninstall.bat
          BUILD_README.md

    - name: Create release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/ClipboardViewer.exe
          install.bat
          uninstall.bat
          BUILD_README.md
        draft: false
        prerelease: false
